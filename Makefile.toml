[config]
default_to_workspace = false

[env]
# TEST_BUILD_JOBS: limits COMPILATION parallelism (OOM prevention).
# Applies to: test, test-std, coverage — NOT doc-test (lightweight, no OOM risk).
# Default: 2. Override: `TEST_BUILD_JOBS=8 cargo make test` or set in OS/shell profile.
# NOTE: env_files (.env.local) values are NOT available for ${} expansion in args —
#       only [env] section vars and OS env vars work with cargo-make interpolation.
TEST_BUILD_JOBS = { value = "8", condition = { env_not_set = ["TEST_BUILD_JOBS"] } }

# ─────────────────────────────────────────────
# Build
# ─────────────────────────────────────────────
[tasks.build]
description = "Production build of the Tauri desktop app"
command = "cargo"
args = ["tauri", "build"]

[tasks.check]
description = "Fast workspace compilation check (no codegen)"
command = "cargo"
args = ["check", "--workspace", "--all-targets"]
cwd = "src-tauri"

[tasks.clean]
description = "Remove build artifacts (Rust target + frontend dist)"
script = [
  "cargo clean --manifest-path src-tauri/Cargo.toml",
  "rm -rf dist",
]

# ─────────────────────────────────────────────
# Quality Gate
# ─────────────────────────────────────────────
[tasks.qa]
description = "Run full quality gate: sqlx-prepare → Rust + TypeScript"
run_task = { name = ["sqlx-prepare", "qa-rs", "qa-ts"], fork = true }

[tasks.sqlx-prepare]
description = "Reset dev.db from migrations and regenerate .sqlx/ query cache"
cwd = "src-tauri"
script = [
  "cargo sqlx database reset -y",
  "cargo sqlx prepare --workspace",
]

[tasks.check-all]
description = "Static checks only (no tests): fmt-check → clippy → lint-ts → ts-check"
run_task = { name = ["fmt-rs-check", "fmt-ts-check", "clippy", "lint-ts", "ts-check"], fork = true }

[tasks.qa-rs]
description = "Rust quality gate: fmt → clippy → test → doc-test → doc-check"
run_task = { name = ["fmt-rs", "clippy", "test", "doc-test", "doc-check"], fork = true }

[tasks.qa-ts]
description = "TypeScript quality gate: fmt → lint → type-check → test"
run_task = { name = ["fmt-ts", "lint-ts", "ts-check", "test-ts"], fork = true }

# ─────────────────────────────────────────────
# Formatting
# ─────────────────────────────────────────────
[tasks.fmt]
description = "Format all code (Rust + TypeScript)"
run_task = { name = ["fmt-rs", "fmt-ts"], fork = true }

[tasks.fmt-rs]
description = "Format all Rust workspace crates"
command = "cargo"
args = ["fmt", "--all", "${@}"]
cwd = "src-tauri"

[tasks.fmt-rs-check]
description = "Check Rust formatting without modifying files"
command = "cargo"
args = ["fmt", "--all", "--check", "${@}"]
cwd = "src-tauri"

[tasks.fmt-ts]
description = "Format TypeScript/frontend code with Biome"
command = "pnpm"
args = ["biome", "format", "--write", "."]

[tasks.fmt-ts-check]
description = "Check TypeScript/frontend formatting (no modification)"
command = "pnpm"
args = ["biome", "check", "--linter-enabled=false", "."]

# ─────────────────────────────────────────────
# Linting
# ─────────────────────────────────────────────
[tasks.clippy]
description = "Lint all Rust workspace crates (warnings = errors)"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--", "-Dwarnings"]
cwd = "src-tauri"

[tasks.lint-ts]
description = "Lint TypeScript/frontend code with Biome"
command = "pnpm"
args = ["biome", "lint", "."]

# ─────────────────────────────────────────────
# Type checking
# ─────────────────────────────────────────────
[tasks.ts-check]
description = "TypeScript type check (no emit)"
command = "pnpm"
args = ["tsc", "--noEmit"]

# ─────────────────────────────────────────────
# Testing
# ─────────────────────────────────────────────
[tasks.test-ts]
description = "Run TypeScript/frontend tests with Vitest"
command = "pnpm"
args = ["vitest", "run", "--passWithNoTests"]

[tasks.test]
description = "Run tests with cargo-nextest (build parallelism limited to avoid OOM)"
install_crate = { crate_name = "cargo-nextest", binary = "cargo", test_arg = [
  "nextest", "--help",
] }
command = "cargo"
args = [
  "nextest", "run", "--workspace",
  "--build-jobs", "${TEST_BUILD_JOBS}",
  "--status-level", "fail",
  "--final-status-level", "skip",
  "--no-tests=pass",
]
cwd = "src-tauri"

[tasks.test-filter]
description = "Run specific tests by name pattern: TEST_FILTER=pattern cargo make test-filter"
install_crate = { crate_name = "cargo-nextest", binary = "cargo", test_arg = [
  "nextest", "--help",
] }
command = "cargo"
args = [
  "nextest", "run", "--workspace",
  "--build-jobs", "${TEST_BUILD_JOBS}",
  "--status-level", "fail",
  "--final-status-level", "skip",
  "--no-tests=pass",
  "-E", "test(/${TEST_FILTER}/)",
]
cwd = "src-tauri"

[tasks.test-std]
description = "Run tests with standard cargo test (no nextest)"
command = "cargo"
args = ["test", "--workspace", "--jobs", "${TEST_BUILD_JOBS}"]
cwd = "src-tauri"

# ─────────────────────────────────────────────
# Coverage
# ─────────────────────────────────────────────
[tasks.coverage]
description = "Run all coverage reports (Rust + TypeScript)"
run_task = { name = ["coverage-rs", "coverage-ts"], fork = true }

[tasks.coverage-rs]
description = "Rust code coverage via cargo-llvm-cov (text summary)"
install_crate = { crate_name = "cargo-llvm-cov", binary = "cargo", test_arg = [
  "llvm-cov", "--help",
] }
command = "cargo"
args = ["llvm-cov", "--workspace", "--all-targets"]
cwd = "src-tauri"

[tasks.coverage-rs-html]
description = "Rust code coverage with HTML report (opens in browser)"
install_crate = { crate_name = "cargo-llvm-cov", binary = "cargo", test_arg = [
  "llvm-cov", "--help",
] }
command = "cargo"
args = ["llvm-cov", "--workspace", "--all-targets", "--html", "--open"]
cwd = "src-tauri"

[tasks.coverage-rs-lcov]
description = "Rust code coverage in LCOV format (for CI integration)"
install_crate = { crate_name = "cargo-llvm-cov", binary = "cargo", test_arg = [
  "llvm-cov", "--help",
] }
command = "cargo"
args = ["llvm-cov", "--workspace", "--all-targets", "--lcov", "--output-path", "target/llvm-cov/lcov.info"]
cwd = "src-tauri"

[tasks.coverage-ts]
description = "TypeScript code coverage via Vitest"
command = "pnpm"
args = ["vitest", "run", "--coverage", "--passWithNoTests"]

# ─────────────────────────────────────────────
# Documentation
# ─────────────────────────────────────────────
[tasks.doc]
description = "Build and open rustdoc for workspace crates (no deps)"
command = "cargo"
args = ["doc", "--no-deps", "--open"]
cwd = "src-tauri"

[tasks.doc-test]
description = "Run documentation tests"
command = "cargo"
args = ["test", "--doc", "--workspace"]
cwd = "src-tauri"

[tasks.doc-check]
description = "Verify rustdoc builds without warnings (Principle VI compliance)"
command = "cargo"
args = ["doc", "--no-deps", "--workspace"]
cwd = "src-tauri"
[tasks.doc-check.env]
RUSTDOCFLAGS = "-D warnings"

# ─────────────────────────────────────────────
# Desktop app
# ─────────────────────────────────────────────
[tasks.serve]
description = "Tauri development server (with file watcher and auto-reload)"
command = "cargo"
args = ["tauri", "dev"]

# ─────────────────────────────────────────────
# Database
# ─────────────────────────────────────────────
[tasks.dev-db-reset]
description = "Delete development SQLite database and restart fresh"
script = [
  "rm -f src-tauri/dev.db src-tauri/dev.db-wal src-tauri/dev.db-shm",
  "rm -rf \"${XDG_DATA_HOME:-$HOME/.local/share}/com.vscode.rustydatabasenotes\"",
  "echo 'Development database reset. Restart the app to re-initialize.'",
]